# Acknowledge native build scripts so installs don't fail on the
# ignored-build-scripts gate.
#   @parcel/watcher: only needed for `dev` (--watch); declined.
#   esbuild / workerd / sharp: pulled in by wrangler (deploy); allowed so the
#   Cloudflare Pages CLI works.
allowBuilds:
  '@parcel/watcher': false
  esbuild: true
  workerd: true
  sharp: true
